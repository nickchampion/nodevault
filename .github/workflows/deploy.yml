name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: build-deploy
    env:
      NODEVAULT: ${{ secrets.NODEVAULT_CONFIGURATION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine diff base
        id: base
        run: |
          BEFORE="${{ github.event.before }}"
          EMPTY_TREE="$(git hash-object -t tree /dev/null)"
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ] \
            && git cat-file -e "$BEFORE^{commit}" 2>/dev/null \
            && git merge-base --is-ancestor "$BEFORE" HEAD 2>/dev/null; then
            SHA="$BEFORE"
          elif git rev-parse --verify -q HEAD~1 >/dev/null; then
            SHA="$(git rev-parse HEAD~1)"
            echo "::warning::github.event.before is not an ancestor of HEAD (likely an amend + force-push) — falling back to HEAD~1 for change detection"
          else
            SHA="$EMPTY_TREE"
            echo "::warning::No previous commit found — treating all files as changed"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          base: ${{ steps.base.outputs.sha }}
          filters: |
            api:
              - 'apps/api/**'
              - 'components/**'
              - 'integrations/**'
            nodevault:
              - 'apps/nodevault/**'
              - 'components/**'
              - 'integrations/**'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Build API
        if: steps.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
        env:
          NODEVAULT: ${{ secrets.NODEVAULT_CONFIGURATION }}
        run: pnpm nx build @platform/apps.api

      - name: Build Next.js (nodevault)
        if: steps.changes.outputs.nodevault == 'true' || github.event_name == 'workflow_dispatch'
        env:
          NEXT_PUBLIC_ENVIRONMENT: prod
          NEXT_PUBLIC_VERSION: ${{ github.sha }}
        run: pnpm nx build-cf @platform/apps.nodevault

      - name: Postgres Migration Neon
        if: steps.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
        env:
          NEXT_PUBLIC_ENVIRONMENT: prod
          NEXT_PUBLIC_VERSION: ${{ github.sha }}
          NODEVAULT: ${{ secrets.NODEVAULT_CONFIGURATION }}
        run: pnpm run db:neon

      - name: Setup flyctl
        if: steps.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API to Fly.io
        if: steps.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        working-directory: apps/api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --local-only

      - name: Deploy nodevault to Cloudflare Workers
        if: steps.changes.outputs.nodevault == 'true' || github.event_name == 'workflow_dispatch'
        working-directory: apps/nodevault
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy
